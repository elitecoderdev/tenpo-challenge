services:
  frontend:
    image: ${FRONTEND_IMAGE_NAME:-tenpo-frontend}:${IMAGE_TAG:-latest}
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    ports:
      - '${FRONTEND_PORT:-3000}:80'
    volumes:
      - ./nginx.standalone.conf:/etc/nginx/conf.d/default.conf:ro
